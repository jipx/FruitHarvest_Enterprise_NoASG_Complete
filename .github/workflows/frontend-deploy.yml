name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region:  ${{ vars.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > .env
          npm run build

      - name: Sync to S3
        run: aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
